server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the FastAPI container on the Docker Compose network.
    # This block exists only in local dev — in Cloud Run, VITE_API_URL is baked
    # into the JS bundle so the browser calls the API directly.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router — serve index.html for all routes so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
